<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparación - 𝐃𝐋𝐈𝐅𝐄</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="ventas.html">Ventas</a></li>
        <li><a href="reparacion.html">Reparación</a></li>
        <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
</nav>

<section class="form-section">
    <h1>Agendar Reparación</h1>

    <form id="repairForm">

        <label>Selecciona tu dispositivo</label>
        <select id="device" required></select>

        <label>Modelo</label>
        <select id="model" required></select>

        <label>Problema del equipo</label>
        <select id="issue" required>
            <option value="">-- Seleccionar problema --</option>
            <option value="battery">Batería</option>
            <option value="screen">Pantalla</option>
            <option value="other">Otro</option>
        </select>

        <label>Descripción (opcional)</label>
        <textarea id="description"></textarea>

        <label>Nombre completo</label>
        <input type="text" id="name">

        <label>Teléfono</label>
        <input type="tel" id="phone">

        <label>Email</label>
        <input type="email" id="email">

        <button type="submit" class="btn primary">Enviar solicitud</button>

    </form>
</section>

<script>
// ================= CATÁLOGO =================
const CATALOG = {
    iphone: ["iPhone 16 Pro Max","iPhone 16 Pro","iPhone 16","iPhone 15 Pro Max","iPhone 15 Pro","iPhone 15","iPhone 14 Pro Max","iPhone 14","iPhone 13","iPhone 12","iPhone 11","iPhone XR","iPhone X"],
    ipad: ["iPad Pro","iPad Air","iPad Mini","iPad 10th Gen","iPad 9th Gen"],
    macbook: ["MacBook Pro M3","MacBook Pro M2","MacBook Air M2","MacBook Air M1"],
    watch: ["Apple Watch Ultra","Apple Watch Series 9","Apple Watch SE"],
    imac: ["iMac M3","iMac M1"]
};

const deviceSelect = document.getElementById("device");
const modelSelect = document.getElementById("model");

// ================= DISPOSITIVOS =================
function loadDevices() {
    deviceSelect.innerHTML = `<option value="">-- Seleccionar dispositivo --</option>`;

    Object.keys(CATALOG).forEach(device => {
        const option = document.createElement("option");
        option.value = device;
        option.textContent = device.toUpperCase();
        deviceSelect.appendChild(option);
    });
}

// ================= MODELOS =================
function loadModels() {
    const device = deviceSelect.value;
    modelSelect.innerHTML = `<option value="">-- Seleccionar modelo --</option>`;

    if (CATALOG[device]) {
        CATALOG[device].forEach(model => {
            const option = document.createElement("option");
            option.value = model;
            option.textContent = model;
            modelSelect.appendChild(option);
        });
    }
}

// ================= EVENTOS =================
deviceSelect.addEventListener("change", loadModels);

// ================= ENVÍO =================
document.getElementById("repairForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const device = deviceSelect.value;
    const model = modelSelect.value;
    const issue = document.getElementById("issue").value;

    const description = document.getElementById("description").value;
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;

    const message = `
╔══════════════════════╗
   DLIFE TECHNOLOGIES
   SOLICITUD REPARACIÓN
╚══════════════════════╝

📱 DISPOSITIVO
• Dispositivo: ${device.toUpperCase()}
• Modelo: ${model}

🛠 PROBLEMA
• ${issue}

📝 DESCRIPCIÓN
• ${description || "No especificada"}

👤 CLIENTE
• Nombre: ${name}
• Teléfono: ${phone}
• Email: ${email}

📌 Generado desde la web
`;

    window.open(`https://wa.me/18292890243?text=${encodeURIComponent(message)}`);
});

// ================= INIT =================
loadDevices();
</script>
<script>
const toggle = document.querySelector('.menu-toggle');
const navLinks = document.querySelector('.nav-links');

toggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
});
</script>
</body>
</html>
