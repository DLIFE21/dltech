<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparación | DLIFE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="ventas.html">Ventas</a></li>
      <li><a href="reparacion.html" class="active">Reparación</a></li>
      <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
    <div class="menu-toggle">☰</div>
  </nav>

  <section class="form-section">
    <div class="form-card">
      <h1>Agendar Reparación</h1>
      <div class="form-sub">Completa el formulario y envía la solicitud por WhatsApp</div>

      <form id="repairForm">
        <div class="input-group">
          <label>Dispositivo</label>
          <select id="device" required></select>
        </div>
        <div class="input-group">
          <label>Modelo</label>
          <select id="model" required></select>
        </div>
        <div class="input-group">
          <label>Problema</label>
          <select id="issue" required>
            <option value="">-- Seleccionar --</option>
            <option value="Batería">🔋 Batería</option>
            <option value="Pantalla">📱 Pantalla</option>
            <option value="Software">💻 Software</option>
            <option value="Otro">🔧 Otro</option>
          </select>
        </div>
        <div class="input-group">
          <label>Descripción (opcional)</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="input-group">
          <label>Nombre completo *</label>
          <input type="text" id="fullname" required>
          <div class="error-message" id="nameError">Nombre requerido</div>
        </div>
        <div class="input-group">
          <label>Teléfono *</label>
          <input type="tel" id="phone" required>
          <div class="error-message" id="phoneError">Teléfono requerido</div>
        </div>
        <div class="input-group">
          <label>Email *</label>
          <input type="email" id="email" required>
          <div class="error-message" id="emailError">Email válido requerido</div>
        </div>

        <div class="preview-card">
          <div class="preview-header">
            <i class="fab fa-whatsapp" style="color:#25D366;"></i> VISTA PREVIA DEL MENSAJE
          </div>
          <div class="preview-message" id="livePreview">Completa el formulario para ver el mensaje...</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <i class="fab fa-whatsapp"></i> Enviar solicitud por WhatsApp
        </button>
      </form>
    </div>
  </section>

  <script src="store.js"></script>
  <script src="main.js"></script>
  <script>
    // Cargar dispositivos desde MODELS
    const deviceSelect = document.getElementById('device');
    const modelSelect = document.getElementById('model');
    const issueSelect = document.getElementById('issue');
    const description = document.getElementById('description');
    const fullname = document.getElementById('fullname');
    const phone = document.getElementById('phone');
    const email = document.getElementById('email');
    const previewDiv = document.getElementById('livePreview');

    // Llenar select de dispositivos
    function loadDevices() {
      deviceSelect.innerHTML = '<option value="">-- Seleccionar dispositivo --</option>';
      for (let key in MODELS) {
        let option = document.createElement('option');
        option.value = key;
        option.textContent = key.toUpperCase();
        deviceSelect.appendChild(option);
      }
    }

    function loadModels() {
      const device = deviceSelect.value;
      modelSelect.innerHTML = '<option value="">-- Seleccionar modelo --</option>';
      if (MODELS[device]) {
        MODELS[device].forEach(model => {
          let option = document.createElement('option');
          option.value = model;
          option.textContent = model;
          modelSelect.appendChild(option);
        });
      }
    }

    // Actualizar previsualización en tiempo real
    function updatePreview() {
      const device = deviceSelect.value || '❌ No especificado';
      const model = modelSelect.value || '❌ No especificado';
      const issue = issueSelect.value || '❌ No especificado';
      const desc = description.value.trim() || '—';
      const nameVal = fullname.value.trim() || '[Nombre pendiente]';
      const phoneVal = phone.value.trim() || '[Teléfono pendiente]';
      const emailVal = email.value.trim() || '[Email pendiente]';
      const orderID = generateOrderID();

      previewDiv.innerHTML = `
📱 *DLIFE REPARACIÓN* 🛠️
🆔 Orden: #${orderID}

📌 *Dispositivo*: ${device}
📌 *Modelo*: ${model}
⚠️ *Problema*: ${issue}
📝 *Descripción*: ${desc}

👤 *Cliente*
• Nombre: ${nameVal}
• Teléfono: ${phoneVal}
• Email: ${emailVal}

🔜 En breve nos contactaremos contigo.
      `.replace(/\n/g, '<br>');
    }

    // Validación estilo Apple
    function validateForm() {
      let valid = true;
      if (!fullname.value.trim()) { showFieldError('nameError', true); valid = false; } else { showFieldError('nameError', false); }
      if (!phone.value.trim()) { showFieldError('phoneError', true); valid = false; } else { showFieldError('phoneError', false); }
      if (!email.value.includes('@') || !email.value.trim()) { showFieldError('emailError', true); valid = false; } else { showFieldError('emailError', false); }
      if (!deviceSelect.value) valid = false;
      if (!modelSelect.value) valid = false;
      if (!issueSelect.value) valid = false;
      return valid;
    }

    function showFieldError(id, show) {
      const err = document.getElementById(id);
      if (err) err.style.display = show ? 'block' : 'none';
      const input = document.querySelector(`#${id.replace('Error', '')}`);
      if (input) input.classList.toggle('error', show);
    }

    // Envío con mensaje profesional
    document.getElementById('repairForm').addEventListener('submit', (e) => {
      e.preventDefault();
      if (!validateForm()) {
        showToast('Completa todos los campos obligatorios', true);
        return;
      }

      const device = deviceSelect.value;
      const model = modelSelect.value;
      const issue = issueSelect.value;
      const desc = description.value.trim();
      const name = fullname.value.trim();
      const phoneVal = phone.value.trim();
      const emailVal = email.value.trim();
      const orderID = generateOrderID();

      const message = `📱 *DLIFE REPARACIÓN* 🛠️
🆔 Orden: #${orderID}

 *Dispositivo*: ${device}
 *Modelo*: ${model}
 *Problema*: ${issue}
 *Descripción*: ${desc || '—'}

 *Cliente*
• Nombre: ${name}
• Teléfono: ${phoneVal}
• Email: ${emailVal}

 Solicitud generada desde la web. Espera confirmación.`;

      sendToWhatsApp(message);
      showToast('Abriendo WhatsApp... envía el mensaje');
    });

    // Eventos para previsualización
    deviceSelect.addEventListener('change', () => { loadModels(); updatePreview(); });
    modelSelect.addEventListener('change', updatePreview);
    issueSelect.addEventListener('change', updatePreview);
    description.addEventListener('input', updatePreview);
    fullname.addEventListener('input', updatePreview);
    phone.addEventListener('input', updatePreview);
    email.addEventListener('input', updatePreview);

    loadDevices();
    updatePreview();
  </script>
</body>
</html>
