<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesorios DLIFE Technologies</title>
    <link rel="stylesheet" href="styles.css">

    <style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0d0d0d;
        color: white;
        padding-top: 70px;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(11,11,11,0.85);
        backdrop-filter: blur(10px);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
    }

    .logo {
        font-size: 1.2rem;
        color: white;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 20px;
    }

    .nav-links a {
        text-decoration: none;
        color: #cccccc;
    }

    .nav-links a:hover {
        color: #ffffff;
    }

    .menu-toggle {
        display: none;
        font-size: 26px;
        color: white;
        cursor: pointer;
    }

    @media (max-width: 768px) {
        .menu-toggle {
            display: block;
        }

        .nav-links {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            background: rgba(11,11,11,0.95);
            flex-direction: column;
            align-items: center;
            display: none;
            padding: 20px 0;
        }

        .nav-links.active {
            display: flex;
        }
    }

    /* CONTENIDO */
    .store {
        text-align: center;
        padding: 40px 20px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .product-card {
        background: #1c1c1e;
        padding: 15px;
        border-radius: 12px;
    }

    .product-card img {
        width: 100%;
        border-radius: 10px;
    }

    .price {
        margin: 10px 0;
        font-weight: bold;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #0071e3;
        color: white;
        cursor: pointer;
    }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="ventas.html">Ventas</a></li>
        <li><a href="reparacion.html">Reparación</a></li>
        <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
    <div class="menu-toggle">☰</div>
</nav>

<section class="store">
    <h1>Accesorios</h1>
    <p>Potencia tu experiencia con accesorios de calidad</p>

    <div class="products" id="productContainer"></div>
</section>

<!-- STORE -->
<script src="store.js"></script>

<script>
const container = document.getElementById("productContainer");
const accessories = STORE.accesorios;

function renderProducts() {
    container.innerHTML = "";

    accessories.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
            <img src="${product.image}">
            <h3>${product.name}</h3>
            <p class="price">RD$${product.price.toLocaleString()}</p>
            <button>Comprar</button>
        `;

        card.querySelector("button").addEventListener("click", () => {
            const message = `Hola, quiero comprar: ${product.name} por RD$${product.price.toLocaleString()}`;
            window.open(`https://wa.me/18292890243?text=${encodeURIComponent(message)}`);
        });

        container.appendChild(card);
    });
}

renderProducts();
</script>

<!-- NAVBAR JS CORREGIDO -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const toggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    if (toggle && navLinks) {
        toggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    }
});
</script>

</body>
</html>
