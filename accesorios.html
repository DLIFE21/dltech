<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesorios DLIFE Technologies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="ventas.html">Ventas</a></li>
        <li><a href="reparacion.html">Reparación</a></li>
        <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
</nav>

<section class="store">
    <h1>Accesorios</h1>
    <p>Potencia tu experiencia con accesorios de calidad</p>

    <div class="products" id="productContainer"></div>
</section>

<!-- 🔥 STORE GLOBAL -->
<script src="store.js"></script>

<script>
const container = document.getElementById("productContainer");
const accessories = STORE.accesorios;

function renderProducts() {
    container.innerHTML = "";

    accessories.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
            <img src="${product.image}">
            <h3>${product.name}</h3>
            <p class="price">RD$${product.price.toLocaleString()}</p>
            <button>Comprar</button>
        `;

        card.querySelector("button").addEventListener("click", () => {
            const message = `Hola, quiero comprar: ${product.name} por RD$${product.price.toLocaleString()}`;
            window.open(`https://wa.me/18292890243?text=${encodeURIComponent(message)}`);
        });

        container.appendChild(card);
    });
}

renderProducts();
</script>

</body>
</html>
